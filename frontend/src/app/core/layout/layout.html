<mat-sidenav-container class="layout-container">
  <mat-sidenav #sidenav mode="over" class="sidenav">
    
    <!-- Header del Sidenav con logo -->
    <div class="sidenav-header">
      <img src="assets/Logo-UTS-1.png" alt="UTS" class="sidenav-logo">
      <h3 class="sidenav-title">SIGRAL-UTS</h3>
    </div>

    <!-- Menú de navegación con MatNavList -->
    <mat-nav-list class="nav-menu">
      
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/cases" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>assignment</mat-icon>
        <span matListItemTitle>Casos</span>
      </a>

      <a *ngIf="role === 'admin'" 
         mat-list-item 
         routerLink="/users" 
         routerLinkActive="active-link" 
         (click)="sidenav.close()">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Usuarios</span>
      </a>

      <a *ngIf="role === 'admin'" 
         mat-list-item 
         routerLink="/audit" 
         routerLinkActive="active-link" 
         (click)="sidenav.close()">
        <mat-icon matListItemIcon>security</mat-icon>
        <span matListItemTitle>Auditoría</span>
      </a>

      <mat-divider></mat-divider>

      <a mat-list-item (click)="logout(); sidenav.close()" class="logout-item">
        <mat-icon matListItemIcon>exit_to_app</mat-icon>
        <span matListItemTitle>Cerrar sesión</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>
    <!-- Toolbar mejorado -->
    <mat-toolbar color="primary" class="main-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      
      <span class="toolbar-title">Sistema Integral de Gestión de Riesgos</span>
      
      <span class="toolbar-spacer"></span>
      
      <!-- Info del usuario -->
      <div class="user-info">
        <mat-icon class="user-icon">account_circle</mat-icon>
        <span class="user-role">{{ role }}</span>
      </div>
    </mat-toolbar>

    <!-- Contenido -->
    <div class="content-wrapper">
      <div class="content-container">
        <router-outlet />
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
